<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOGIN BOX */

.login-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

.login-box h2{
    margin-bottom:25px;
    color:#1e3c72;
}

/* INPUT */

.input-group{
    margin-bottom:20px;
    text-align:left;
}

.input-group label{
    font-weight:bold;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* BUTTON */

button{
    width:100%;
    padding:12px;
    border:none;
    background:#1e3c72;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#16325c;
}

/* RESET */

.reset{
    margin-top:15px;
    font-size:13px;
}

.reset a{
    color:#1e3c72;
    text-decoration:none;
}

.reset a:hover{
    text-decoration:underline;
}

/* ERROR MESSAGE */

.error{
    color:red;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<!-- Error Message -->
{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="error">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST" action="/login">

<div class="input-group">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit">Login</button>

</form>

<div class="reset">
<a href="#">Reset Password</a>
</div>

</div>

</body>
</html>
