<!DOCTYPE html>
<html>
<head>

<title>Admin Settings</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.container{
width:450px;
margin:auto;
margin-top:50px;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:15px;
padding:10px;
width:100%;
background:#2c3e50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.back{
background:#7f8c8d;
}

</style>

</head>

<body>

<div class="container">

<h2>Admin Settings</h2>

<form action="/update_admin" method="POST">

<label>Name</label>
<input type="text" name="name" value="{{admin.name}}" required>

<label>Email</label>
<input type="email" name="email" value="{{admin.email}}" required>

<label>Change Password</label>
<input type="password" name="password" value="{{admin.password}}" required>

<button type="submit">Update Settings</button>

</form>

<a href="/dashboard">
<button class="back">Back to Dashboard</button>
</a>

</div>

</body>
</html>
