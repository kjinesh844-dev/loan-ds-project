<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Application</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
}

/* SIDEBAR */

.sidebar{
    height:100vh;
    background:#1e3c72;
    padding-top:20px;
}

.sidebar h3{
    color:white;
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    padding:12px 20px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#2a5298;
}

/* FORM CARD */

.form-card{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-md-2 sidebar">

<h3>Admin Panel</h3>

<a href="/dashboard">Dashboard</a>
<a href="/loan_applications">Loan Applications</a>
<a href="/prediction">Predict Loan Default</a>
<a href="/prediction_results">Prediction Results</a>
<a href="/model_accuracy">Model Accuracy</a>
<a href="/users">User Management</a>
<a href="/logout">Logout</a>

</div>

<!-- MAIN CONTENT -->

<div class="col-md-10 p-4">

<h3 class="mb-4">Loan Application Form</h3>

<div class="form-card">

<form action="/submit_loan" method="POST">

<!-- CUSTOMER INFORMATION -->

<h5>Customer Information</h5>

<div class="row">

<div class="col-md-4 mb-3">
<label>Customer ID</label>
<input type="text" name="customer_id" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Age</label>
<input type="number" name="age" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Gender</label>
<select name="gender" class="form-control">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Marital Status</label>
<select name="marital_status" class="form-control">
<option>Single</option>
<option>Married</option>
</select>
</div>

</div>


<!-- FINANCIAL DETAILS -->

<h5 class="mt-4">Financial Details</h5>

<div class="row">

<div class="col-md-4 mb-3">
<label>Income</label>
<input type="number" name="income" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Employment Type</label>
<select name="employment" class="form-control">
<option>Salaried</option>
<option>Self Employed</option>
<option>Business</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Credit Score</label>
<input type="number" name="credit_score" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Loan Amount</label>
<input type="number" name="loan_amount" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Loan Term (months)</label>
<input type="number" name="loan_term" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Existing Debts</label>
<input type="number" name="debts" class="form-control">
</div>

</div>


<!-- LOAN DETAILS -->

<h5 class="mt-4">Loan Details</h5>

<div class="row">

<div class="col-md-4 mb-3">
<label>Loan Purpose</label>
<select name="purpose" class="form-control">
<option>Home</option>
<option>Car</option>
<option>Education</option>
<option>Business</option>
<option>Personal</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Property Area</label>
<select name="property_area" class="form-control">
<option>Urban</option>
<option>Semi Urban</option>
<option>Rural</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Education</label>
<select name="education" class="form-control">
<option>Graduate</option>
<option>Not Graduate</option>
</select>
</div>

</div>


<!-- BUTTONS -->

<div class="mt-4">

<button type="submit" class="btn btn-primary">Submit</button>

<button type="reset" class="btn btn-secondary">Clear</button>

</div>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
